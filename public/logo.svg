<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131316"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#166534"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8e8ec"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- media cancha inferior -->
  <path d="M0 340 h512 v60 a112 112 0 0 1 -112 112 h-288 a112 112 0 0 1 -112 -112 z" fill="url(#pitch)" opacity=".9"/>
  <circle cx="256" cy="340" r="70" fill="none" stroke="#ffffff44" stroke-width="6"/>
  <line x1="40" y1="340" x2="472" y2="340" stroke="#ffffff44" stroke-width="6"/>
  <rect x="146" y="422" width="220" height="90" fill="none" stroke="#ffffff33" stroke-width="6"/>

  <!-- camiseta -->
  <g transform="translate(96, 78) scale(1.45)">
    <path d="M70 26 L92 14 C97 27 123 27 128 14 L150 26 L188 52 L166 82 L152 70 L152 182 L68 182 L68 70 L54 82 L32 52 Z"
      fill="url(#shirt)" stroke="#141417" stroke-width="7" stroke-linejoin="round"/>
    <path d="M92 14 C97 27 123 27 128 14" fill="none" stroke="#141417" stroke-width="7" stroke-linecap="round"/>
    <text x="110" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
      font-weight="900" font-size="82" fill="#141417">10</text>
  </g>

  <!-- estrella dorada -->
  <path d="M256 34 l10 20 22 3 -16 16 4 22 -20 -10 -20 10 4 -22 -16 -16 22 -3 z" fill="#f0c243"/>
